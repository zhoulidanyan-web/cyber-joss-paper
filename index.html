<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>清明·焚纸祭思</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #080808;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useRef, useEffect, useCallback } = React;

/* ═══════════════════════════════════════════
   火焰粒子 — 每张纸钱持续发射的小火舌
   ═══════════════════════════════════════════ */
/* 粒子数量上限 */
const MAX_FLAMES = 600;
const MAX_EMBERS = 200;
const MAX_ASHES  = 150;
const MAX_PAPERS = 80;

class FlameParticle {
  constructor(x, y, size) {
    const spread = size * 0.45;
    this.x = x + (Math.random() - 0.5) * spread;
    this.y = y + (Math.random() - 0.3) * spread * 0.4;
    this.baseSize = (5 + Math.random() * 8) * (size / 36);
    this.curSize = this.baseSize;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = -(1.2 + Math.random() * 2.2);
    this.life = 1.0;
    this.decay = 0.015 + Math.random() * 0.02;
    this.wobbleAmp = 0.4 + Math.random() * 0.8;
    this.wobbleFreq = 0.04 + Math.random() * 0.07;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.age = 0;
  }

  update() {
    this.age++;
    this.life -= this.decay;
    this.x += this.vx + Math.sin(this.age * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    this.y += this.vy;
    this.vy *= 0.985;
    this.curSize = this.baseSize * Math.max(0, this.life);
    return this.life > 0;
  }

  draw(ctx) {
    if (this.curSize < 0.5) return;
    const t = 1 - this.life;

    let r, g, b, a;
    if (t < 0.15) {
      r = 255; g = 255; b = 220;
      a = this.life * 0.7;
    } else if (t < 0.35) {
      const p = (t - 0.15) / 0.2;
      r = 255; g = 255 - p * 60 | 0; b = 220 - p * 170 | 0;
      a = this.life * 0.65;
    } else if (t < 0.65) {
      const p = (t - 0.35) / 0.3;
      r = 255; g = 195 - p * 95 | 0; b = 50 - p * 30 | 0;
      a = this.life * 0.55;
    } else {
      const p = (t - 0.65) / 0.35;
      r = 255 - p * 100 | 0; g = 100 - p * 70 | 0; b = 20 - p * 15 | 0;
      a = this.life * 0.4;
    }

    // 保留泪滴形状，用纯色填充替代径向渐变
    const s = this.curSize;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.6);
    ctx.bezierCurveTo(s * 0.5, -s * 0.8, s, s * 0.2, 0, s * 0.6);
    ctx.bezierCurveTo(-s, s * 0.2, -s * 0.5, -s * 0.8, 0, -s * 1.6);
    ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
    ctx.fill();
    ctx.restore();
  }
}

/* ═══════════════════════════════════════════
   火星/余烬粒子 — 小亮点飞散
   ═══════════════════════════════════════════ */
class EmberParticle {
  constructor(x, y, size) {
    this.x = x + (Math.random() - 0.5) * size * 0.4;
    this.y = y + (Math.random() - 0.5) * size * 0.3;
    this.size = 0.8 + Math.random() * 1.8;
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = -(1 + Math.random() * 2.5);
    this.gravity = 0.01 + Math.random() * 0.02;
    this.life = 1.0;
    this.decay = 0.008 + Math.random() * 0.015;
    this.brightness = 0.6 + Math.random() * 0.4;
  }

  update() {
    this.life -= this.decay;
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.995;
    return this.life > 0;
  }

  draw(ctx) {
    const a = this.life * this.brightness;
    const t = 1 - this.life;
    const g = 200 - t * 120 | 0;
    const b = 80 - t * 60 | 0;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,${g},${b},${a})`;
    ctx.fill();
  }
}

/* ═══════════════════════════════════════════
   烟灰粒子 — 燃尽后的灰烬
   ═══════════════════════════════════════════ */
class AshParticle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 15;
    this.y = y;
    this.size = 1 + Math.random() * 2.5;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = -(0.3 + Math.random() * 0.8);
    this.life = 1.0;
    this.decay = 0.004 + Math.random() * 0.006;
    this.swayPhase = Math.random() * Math.PI * 2;
    this.age = 0;
  }

  update() {
    this.age++;
    this.life -= this.decay;
    this.x += this.vx + Math.sin(this.age * 0.02 + this.swayPhase) * 0.25;
    this.y += this.vy;
    this.size *= 0.9995;
    return this.life > 0;
  }

  draw(ctx) {
    const a = this.life * 0.25;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100, 70, 40, ${a})`;
    ctx.fill();
  }
}

/* ═══════════════════════════════════════════
   祭品类型 — 常见中国祭祀焚烧物
   coin   = 圆形纸钱（方孔铜钱样式）
   ingot  = 金元宝
   silver = 银元宝
   note   = 冥币（长方形纸币）
   yellow = 黄表纸（黄色长方纸）
   ═══════════════════════════════════════════ */
function pickOffering() {
  const r = Math.random();
  if (r < 0.25) return 'coin';
  if (r < 0.45) return 'ingot';
  if (r < 0.68) return 'note';
  if (r < 0.84) return 'yellow';
  return 'silver';
}

class JossPaper {
  constructor(x, y) {
    this.type = pickOffering();
    this.x = x + (Math.random() - 0.5) * 80;
    this.y = y + (Math.random() - 0.5) * 50;

    // 各类型大小与衰减速度
    switch (this.type) {
      case 'coin':
        this.size = 70 + Math.random() * 30;
        this.decay = 0.001 + Math.random() * 0.0008;
        break;
      case 'ingot':
        this.size = 62 + Math.random() * 26;
        this.decay = 0.0009 + Math.random() * 0.0007;
        break;
      case 'silver':
        this.size = 56 + Math.random() * 22;
        this.decay = 0.0009 + Math.random() * 0.0007;
        break;
      case 'note':
        this.size = 85 + Math.random() * 35;
        this.decay = 0.0012 + Math.random() * 0.0008;
        break;
      case 'yellow':
        this.size = 68 + Math.random() * 28;
        this.decay = 0.0013 + Math.random() * 0.0009;
        break;
    }

    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.015;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = -(0.25 + Math.random() * 0.45);
    this.swayAmp = 0.2 + Math.random() * 0.4;
    this.swayFreq = 0.006 + Math.random() * 0.01;
    this.swayPhase = Math.random() * Math.PI * 2;
    this.life = 1.0;
    this.burnEdge = 0;
    this.flickerOffset = Math.random() * 1000;
    this.age = 0;
    this.burnOrigin = Math.random() * Math.PI * 2;
    this.edgeNoise = Array.from({length: 16}, () => Math.random() * 0.3 + 0.85);
  }

  /* 给定角度返回形状边界到中心的距离 */
  _baseRadius(angle) {
    const s = this.size;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const ac = Math.abs(cos) + 1e-6, as = Math.abs(sin) + 1e-6;

    switch (this.type) {
      case 'coin':
        return s * 0.5;

      case 'ingot': case 'silver': {
        // 元宝：上宽下窄的船形，用变形椭圆逼近
        let hw = s * 0.55, hh = s * 0.38;
        if (sin < 0) { hw *= 1.15; hh *= (0.88 + Math.abs(cos) * 0.2); }
        else { hw *= 0.7; }
        return (hw * hh) / Math.sqrt((hh * cos) ** 2 + (hw * sin) ** 2);
      }

      case 'note': {
        const hw = s * 0.34, hh = s * 0.50;
        return Math.min(hw / ac, hh / as);
      }

      case 'yellow': {
        const hw = s * 0.40, hh = s * 0.50;
        return Math.min(hw / ac, hh / as);
      }
    }
  }

  /* 形状最大半径（用于渐变范围） */
  _maxRadius() {
    switch (this.type) {
      case 'coin': return this.size * 0.5;
      case 'ingot': return this.size * 0.58;
      case 'silver': return this.size * 0.54;
      case 'note': return Math.sqrt((this.size * 0.34) ** 2 + (this.size * 0.50) ** 2);
      case 'yellow': return Math.sqrt((this.size * 0.40) ** 2 + (this.size * 0.50) ** 2);
    }
  }

  /* 中心颜色 */
  _centerRGB(burnT) {
    switch (this.type) {
      case 'coin':   return [238 - burnT * 80 | 0, 195 - burnT * 100 | 0, 50 - burnT * 30 | 0];
      case 'ingot':  return [255 - burnT * 70 | 0, 218 - burnT * 100 | 0, 55 - burnT * 35 | 0];
      case 'silver': return [215 - burnT * 80 | 0, 220 - burnT * 90 | 0, 228 - burnT * 100 | 0];
      case 'note':   return [228 - burnT * 80 | 0, 195 - burnT * 90 | 0, 135 - burnT * 65 | 0];
      case 'yellow': return [238 - burnT * 80 | 0, 215 - burnT * 100 | 0, 75 - burnT * 40 | 0];
    }
  }

  /* 边缘颜色 */
  _edgeRGB(burnT) {
    switch (this.type) {
      case 'coin':   return [80 - burnT * 50 | 0, 35 - burnT * 20 | 0, 10];
      case 'ingot':  return [90 - burnT * 50 | 0, 42 - burnT * 22 | 0, 10];
      case 'silver': return [70 - burnT * 40 | 0, 68 - burnT * 38 | 0, 65 - burnT * 35 | 0];
      case 'note':   return [80 - burnT * 50 | 0, 32 - burnT * 18 | 0, 10];
      case 'yellow': return [82 - burnT * 50 | 0, 42 - burnT * 22 | 0, 10];
    }
  }

  update(flames, embers, ashes) {
    this.age++;
    this.life -= this.decay;
    this.burnEdge = Math.min(1, (1 - this.life) * 1.4);

    this.x += this.vx + Math.sin(this.age * this.swayFreq + this.swayPhase) * this.swayAmp;
    this.y += this.vy;
    this.rotation += this.rotSpeed;

    const flamePressure = flames.length / MAX_FLAMES;
    const spawnScale = flamePressure > 0.7 ? Math.max(0.1, 1 - (flamePressure - 0.7) / 0.3) : 1;

    if (this.burnEdge > 0.05) {
      const intensity = Math.min(1, this.burnEdge * 2) * (this.life > 0.15 ? 1 : this.life / 0.15) * spawnScale;
      if (Math.random() < intensity * 0.85) {
        flames.push(new FlameParticle(this.x, this.y, this.size));
      }
      if (Math.random() < intensity * 0.08) {
        embers.push(new EmberParticle(this.x, this.y, this.size));
      }
    }

    if (this.burnEdge > 0.3 && Math.random() < 0.03) {
      ashes.push(new AshParticle(this.x, this.y - this.size * 0.3));
    }

    if (this.life < 0.25) {
      this.size *= 0.996;
      this.vy *= 0.998;
    }

    return this.life > 0 && this.size > 2;
  }

  draw(ctx, time) {
    const s = this.size;
    const alpha = Math.min(1, this.life * 2.5);
    const burnT = this.burnEdge;
    const maxR = this._maxRadius();

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    // ── 背景光晕 ──
    const glowR = s * (2.2 + burnT * 2.8);
    const glowA = alpha * 0.15 * Math.min(1, burnT * 3);
    if (glowA > 0.005) {
      const glow = ctx.createRadialGradient(0, 0, s * 0.15, 0, 0, glowR);
      glow.addColorStop(0, `rgba(255,140,30,${glowA})`);
      glow.addColorStop(0.4, `rgba(255,80,15,${glowA * 0.4})`);
      glow.addColorStop(1, 'rgba(180,40,5,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── 形状轮廓（带燃烧蚕食）──
    const segments = 32;
    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const baseR = this._baseRadius(angle);
      const angleDist = Math.abs(((angle - this.burnOrigin + Math.PI * 3) % (Math.PI * 2)) - Math.PI) / Math.PI;
      const noise = this.edgeNoise[i % this.edgeNoise.length];
      const localBurn = Math.max(0, burnT * 1.8 - angleDist * 0.6) * noise;
      const r = baseR * (1 - localBurn * 0.4);
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();

    // ── 填充渐变 ──
    const [cr, cg, cb] = this._centerRGB(burnT);
    const [er, eg, eb] = this._edgeRGB(burnT);
    const grad = ctx.createRadialGradient(0, 0, s * 0.05, 0, 0, maxR);
    grad.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
    grad.addColorStop(0.55, `rgba(${(cr + er) >> 1},${(cg + eg) >> 1},${(cb + eb) >> 1},${alpha})`);
    grad.addColorStop(0.85, `rgba(${er},${eg},${eb},${alpha * 0.9})`);
    grad.addColorStop(1, `rgba(${Math.max(0, er - 20)},${Math.max(0, eg - 10)},5,${alpha * 0.7})`);
    ctx.fillStyle = grad;
    ctx.fill();

    // ── 燃烧边缘发光（10采样点）──
    if (burnT > 0.05) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const baseR = this._baseRadius(angle);
        const angleDist = Math.abs(((angle - this.burnOrigin + Math.PI * 3) % (Math.PI * 2)) - Math.PI) / Math.PI;
        const noiseIdx = (i * 3) % this.edgeNoise.length;
        const localBurn = Math.max(0, burnT * 1.8 - angleDist * 0.6) * this.edgeNoise[noiseIdx];

        if (localBurn > 0.05 && localBurn < 0.9) {
          const edgeI = Math.sin(localBurn * Math.PI) * 0.8;
          const r = baseR * (1 - localBurn * 0.4);
          const ex = Math.cos(angle) * r, ey = Math.sin(angle) * r;
          const gs = s * 0.12 * edgeI;
          const flick = Math.sin(time * 0.015 + i * 3.36 + this.flickerOffset) * 0.2 + 0.8;
          const eA = edgeI * alpha * flick * 0.7;

          const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, gs);
          eg.addColorStop(0, `rgba(255,220,140,${eA})`);
          eg.addColorStop(0.3, `rgba(255,160,40,${eA * 0.6})`);
          eg.addColorStop(1, 'rgba(200,60,10,0)');
          ctx.fillStyle = eg;
          ctx.beginPath();
          ctx.arc(ex, ey, gs, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // ── 类型专属细节 ──
    this._drawDetails(ctx, alpha, burnT, time);

    ctx.restore();
  }

  _drawDetails(ctx, alpha, burnT, time) {
    const s = this.size;

    switch (this.type) {

      /* ── 圆形纸钱：方孔+纹饰 ── */
      case 'coin': {
        const holeAlpha = alpha * Math.max(0, 1 - burnT * 1.2);
        if (holeAlpha > 0.02) {
          const hs = s * 0.11;
          ctx.save();
          ctx.rotate(Math.PI / 4);
          ctx.beginPath();
          ctx.rect(-hs, -hs, hs * 2, hs * 2);
          ctx.fillStyle = `rgba(8,6,4,${holeAlpha})`;
          ctx.fill();
          ctx.strokeStyle = `rgba(${160 - burnT * 80 | 0},${110 - burnT * 60 | 0},25,${holeAlpha * 0.4})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
          ctx.restore();
        }
        if (burnT < 0.7) {
          const oa = alpha * (1 - burnT * 1.3) * 0.3;
          if (oa > 0.02) {
            ctx.beginPath(); ctx.arc(0, 0, s * 0.46, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(190,150,40,${oa})`; ctx.lineWidth = 0.7; ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, s * 0.28, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(170,130,30,${oa * 0.7})`; ctx.lineWidth = 0.5; ctx.stroke();
          }
        }
        break;
      }

      /* ── 金/银元宝：顶部弧线高光+底部边线 ── */
      case 'ingot': case 'silver': {
        const da = alpha * Math.max(0, 1 - burnT * 1.3);
        if (da < 0.03) break;
        const isGold = this.type === 'ingot';
        // 顶部弧形高光
        ctx.beginPath();
        ctx.moveTo(-s * 0.42, -s * 0.08);
        ctx.quadraticCurveTo(0, -s * 0.28, s * 0.42, -s * 0.08);
        ctx.strokeStyle = isGold
          ? `rgba(255,242,160,${da * 0.55})`
          : `rgba(235,240,248,${da * 0.55})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // 中部横线
        ctx.beginPath();
        ctx.moveTo(-s * 0.38, s * 0.04);
        ctx.lineTo(s * 0.38, s * 0.04);
        ctx.strokeStyle = isGold
          ? `rgba(200,160,30,${da * 0.3})`
          : `rgba(170,175,185,${da * 0.3})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
        // 底部弧线
        ctx.beginPath();
        ctx.moveTo(-s * 0.28, s * 0.2);
        ctx.quadraticCurveTo(0, s * 0.28, s * 0.28, s * 0.2);
        ctx.strokeStyle = isGold
          ? `rgba(180,130,20,${da * 0.35})`
          : `rgba(140,145,155,${da * 0.35})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // 顶部反光点
        if (da > 0.15) {
          const sparkle = (Math.sin(time * 0.003 + this.flickerOffset) * 0.5 + 0.5) * da * 0.35;
          ctx.beginPath();
          ctx.arc(-s * 0.12, -s * 0.18, s * 0.04, 0, Math.PI * 2);
          ctx.fillStyle = isGold
            ? `rgba(255,255,220,${sparkle})`
            : `rgba(240,245,255,${sparkle})`;
          ctx.fill();
        }
        break;
      }

      /* ── 冥币：红色边框+图案+面额 ── */
      case 'note': {
        const da = alpha * Math.max(0, 1 - burnT * 1.2);
        if (da < 0.03) break;
        const hw = s * 0.30, hh = s * 0.44;
        // 外边框
        ctx.strokeStyle = `rgba(175,45,35,${da * 0.6})`;
        ctx.lineWidth = 1.8;
        ctx.strokeRect(-hw, -hh, hw * 2, hh * 2);
        // 内边框
        const m = s * 0.05;
        ctx.strokeStyle = `rgba(155,38,30,${da * 0.4})`;
        ctx.lineWidth = 0.8;
        ctx.strokeRect(-hw + m, -hh + m, (hw - m) * 2, (hh - m) * 2);
        // 顶部标题线（模拟"冥通银行"）
        const ta = da * 0.35;
        ctx.fillStyle = `rgba(130,35,28,${ta})`;
        const lw = hw * 0.7;
        ctx.fillRect(-lw, -hh * 0.72, lw * 2, s * 0.028);
        ctx.fillRect(-lw * 0.5, -hh * 0.58, lw, s * 0.022);
        // 中心面额圆圈
        ctx.beginPath();
        ctx.arc(0, -hh * 0.05, s * 0.11, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(160,50,40,${da * 0.45})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
        // 面额内图案（简化十字）
        const cs = s * 0.06;
        ctx.fillStyle = `rgba(150,48,38,${da * 0.3})`;
        ctx.fillRect(-cs * 0.12, -hh * 0.05 - cs, cs * 0.24, cs * 2);
        ctx.fillRect(-cs, -hh * 0.05 - cs * 0.12, cs * 2, cs * 0.24);
        // 底部编号线
        ctx.fillStyle = `rgba(120,40,30,${ta * 0.8})`;
        ctx.fillRect(-lw * 0.55, hh * 0.45, lw * 1.1, s * 0.02);
        ctx.fillRect(-lw * 0.35, hh * 0.58, lw * 0.7, s * 0.018);
        // 四角花纹（小方块）
        const cn = s * 0.025;
        const ca = da * 0.3;
        ctx.fillStyle = `rgba(160,50,40,${ca})`;
        ctx.fillRect(-hw + m * 0.6, -hh + m * 0.6, cn, cn);
        ctx.fillRect(hw - m * 0.6 - cn, -hh + m * 0.6, cn, cn);
        ctx.fillRect(-hw + m * 0.6, hh - m * 0.6 - cn, cn, cn);
        ctx.fillRect(hw - m * 0.6 - cn, hh - m * 0.6 - cn, cn, cn);
        break;
      }

      /* ── 黄表纸：折痕+质感 ── */
      case 'yellow': {
        const da = alpha * Math.max(0, 1 - burnT * 1.3);
        if (da < 0.02) break;
        const hw = s * 0.36, hh = s * 0.44;
        // 纸张折痕
        ctx.strokeStyle = `rgba(210,180,55,${da * 0.2})`;
        ctx.lineWidth = 0.5;
        // 竖折
        ctx.beginPath();
        ctx.moveTo(0, -hh * 0.8); ctx.lineTo(0, hh * 0.8);
        ctx.stroke();
        // 横折
        ctx.beginPath();
        ctx.moveTo(-hw * 0.8, hh * 0.05); ctx.lineTo(hw * 0.8, hh * 0.05);
        ctx.stroke();
        // 纸张纹理（几条细横线）
        ctx.strokeStyle = `rgba(200,170,45,${da * 0.1})`;
        ctx.lineWidth = 0.3;
        for (let i = -3; i <= 3; i++) {
          if (i === 0) continue;
          ctx.beginPath();
          ctx.moveTo(-hw * 0.6, i * hh * 0.22);
          ctx.lineTo(hw * 0.6, i * hh * 0.22);
          ctx.stroke();
        }
        break;
      }
    }
  }
}

/* ═══════════════════════════════════════════
   主组件
   ═══════════════════════════════════════════ */
function App() {
  const canvasRef = useRef(null);
  const stateRef = useRef({
    papers: [],
    flames: [],
    embers: [],
    ashes: [],
    pressing: false,
    pressX: 0,
    pressY: 0,
    spawnTimer: 0,
    animId: 0,
  });

  const getPos = useCallback((e) => {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }, []);

  const onDown = useCallback((e) => {
    e.preventDefault();
    const pos = getPos(e);
    const s = stateRef.current;
    s.pressing = true;
    s.pressX = pos.x * window.devicePixelRatio;
    s.pressY = pos.y * window.devicePixelRatio;
  }, [getPos]);

  const onMove = useCallback((e) => {
    if (!stateRef.current.pressing) return;
    const pos = getPos(e);
    stateRef.current.pressX = pos.x * window.devicePixelRatio;
    stateRef.current.pressY = pos.y * window.devicePixelRatio;
  }, [getPos]);

  const onUp = useCallback(() => {
    stateRef.current.pressing = false;
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    const resize = () => {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    };
    resize();
    window.addEventListener('resize', resize);

    const s = stateRef.current;

    const loop = (now) => {
      s.animId = requestAnimationFrame(loop);

      // 清除
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 按压生成纸钱
      if (s.pressing) {
        s.spawnTimer += 16.67;
        while (s.spawnTimer >= 130) {
          s.spawnTimer -= 130;
          if (s.papers.length < MAX_PAPERS) {
            s.papers.push(new JossPaper(s.pressX, s.pressY));
          }
        }
      } else {
        s.spawnTimer = 60;
      }

      // 更新纸钱
      s.papers = s.papers.filter(p => p.update(s.flames, s.embers, s.ashes));

      // 硬上限截断（保留最新的粒子）
      if (s.flames.length > MAX_FLAMES) s.flames.splice(0, s.flames.length - MAX_FLAMES);
      if (s.embers.length > MAX_EMBERS) s.embers.splice(0, s.embers.length - MAX_EMBERS);
      if (s.ashes.length > MAX_ASHES)   s.ashes.splice(0, s.ashes.length - MAX_ASHES);

      // 绘制纸钱主体
      s.papers.forEach(p => p.draw(ctx, now));

      // additive blending 绘制火焰和火星
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      s.flames = s.flames.filter(f => {
        const alive = f.update();
        if (alive) f.draw(ctx);
        return alive;
      });

      s.embers = s.embers.filter(e => {
        const alive = e.update();
        if (alive) e.draw(ctx);
        return alive;
      });

      ctx.restore();

      // 烟灰
      s.ashes = s.ashes.filter(a => {
        const alive = a.update();
        if (alive) a.draw(ctx);
        return alive;
      });

      // 底部提示
      const fontSize = 14 * dpr;
      ctx.font = `300 ${fontSize}px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif`;
      ctx.textAlign = 'center';
      const hasContent = s.papers.length > 0 || s.flames.length > 0;
      ctx.fillStyle = `rgba(140, 120, 90, ${hasContent ? 0.15 : 0.35})`;
      ctx.fillText('长按屏幕 焚纸祭思', canvas.width / 2, canvas.height - 30 * dpr);
    };

    s.animId = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(s.animId);
      window.removeEventListener('resize', resize);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      onMouseDown={onDown}
      onMouseMove={onMove}
      onMouseUp={onUp}
      onMouseLeave={onUp}
      onTouchStart={onDown}
      onTouchMove={onMove}
      onTouchEnd={onUp}
      onTouchCancel={onUp}
      style={{ display: 'block', cursor: 'default' }}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
